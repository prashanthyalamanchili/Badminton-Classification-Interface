<!DOCTYPE html>
<html>
<head>
    <title>Badminton Video Analysis</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="overlay">
        <div class="card">
            <h1>Badminton Video Analysis</h1>
            <p class="subtitle">
                Upload a badminton match video to generate an annotated classification output.
            </p>

            <div class="upload-box">
                <input type="file" id="videoInput" accept="video/*">
            </div>

            <button onclick="uploadVideo()" id="analyseBtn">
                Analyse Video
            </button>

            <p id="status"></p>

            <div class="result-section">
                <video id="outputVideo" controls style="display:none;"></video>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
